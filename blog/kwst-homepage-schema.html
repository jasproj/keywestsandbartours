<!--
  KWST HOMEPAGE SCHEMA BLOCK
  ===========================
  Paste the ENTIRE contents of this file into your homepage <head>, just before </head>.

  Placeholders filled in 2026-04-17. AggregateRating uses placeholder values (4.9 / 500)
  until real FareHarbor review counts are pulled. Update ratingValue and reviewCount
  once you have verified numbers from your Google Business Profile or TripAdvisor listing.

  WHAT THIS SCHEMA ADDS OVER COMPETITORS:
  ✅ TravelAgency (more specific than LocalBusiness for tour operators)
  ✅ AggregateRating (star display in search — ZERO competitors have this)
  ✅ GeoCoordinates (local pack signal — only casualmondaycharters.com has this)
  ✅ openingHoursSpecification (hours in local pack)

  ✅ sameAs social links (entity recognition for AI systems)
  ✅ priceRange with explicit range (pricing signal for AI citation)
-->

        "height": 100

      "priceRange": "$110–$980",
      "currenciesAccepted": "USD",
      "paymentAccepted": "Credit Card, Debit Card",
      "address": {
        "@type": "PostalAddress",

      },

        {
          "@type": "City",

        {

      "@type": "WebSite",
      "@id": "https://keywestsandbartours.com/#website",
      "url": "https://keywestsandbartours.com",
      "name": "Key West Sandbar Tours",
      "description": "Find and book Key West sandbar tours, private charters, and eco adventures. 1,000+ tours from 200 operators.",
      "publisher": {
        "@id": "https://keywestsandbartours.com/#business"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://keywestsandbartours.com/tours?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
  ]
